name: NAIM production release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: naim-production-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NAIM_RELEASE_SHA: ${{ github.sha }}
  NAIM_RELEASE_TAG: ${{ github.sha }}
  NAIM_RELEASE_BRANCH: main
  NAIM_HPC1_SSH: ${{ vars.NAIM_HPC1_SSH || 'baal@195.168.22.186' }}
  NAIM_HPC1_SSH_PORT: ${{ vars.NAIM_HPC1_SSH_PORT || '2222' }}
  NAIM_HPC1_REPO_PATH: ${{ vars.NAIM_HPC1_REPO_PATH || '/opt/naim/repos/naim-node' }}
  NAIM_HPC1_VCPKG_ROOT: ${{ vars.NAIM_HPC1_VCPKG_ROOT || '' }}
  NAIM_MAIN_SSH: ${{ vars.NAIM_MAIN_SSH || 'baal@51.68.181.52' }}
  NAIM_REGISTRY: ${{ vars.NAIM_REGISTRY || 'chainzano.com' }}
  NAIM_REGISTRY_PROJECT: ${{ vars.NAIM_REGISTRY_PROJECT || 'naim' }}
  NAIM_REGISTRY_USERNAME: ${{ secrets.NAIM_REGISTRY_USERNAME || vars.NAIM_REGISTRY_USERNAME || 'admin' }}
  NAIM_BUILD_TYPE: ${{ vars.NAIM_BUILD_TYPE || 'Release' }}
  NAIM_CUDA_ARCHITECTURES: ${{ vars.NAIM_CUDA_ARCHITECTURES || '120a-real' }}
  NAIM_CUDA_NVCC_JOBS: ${{ vars.NAIM_CUDA_NVCC_JOBS || '1' }}
  NAIM_COMPILER_CACHE: ${{ vars.NAIM_COMPILER_CACHE || 'auto' }}
  NAIM_CMAKE_ARGS: ${{ vars.NAIM_CMAKE_ARGS || '' }}
  NAIM_MIGRATION_TIMEOUT_SEC: ${{ vars.NAIM_MIGRATION_TIMEOUT_SEC || '600' }}

jobs:
  hpc1-pull:
    name: 1. hpc1 pull main
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-naim-ssh
        with:
          ssh-private-key: ${{ secrets.NAIM_DEPLOY_SSH_KEY }}
      - name: Pull commit on hpc1
        shell: bash
        run: |
          set -euo pipefail
          repo_q="$(printf '%q' "${NAIM_HPC1_REPO_PATH}")"
          ssh ${NAIM_CI_SSH_OPTS} -p "${NAIM_HPC1_SSH_PORT}" "${NAIM_HPC1_SSH}" \
            "cd ${repo_q} && NAIM_RELEASE_SHA='${NAIM_RELEASE_SHA}' NAIM_RELEASE_BRANCH='${NAIM_RELEASE_BRANCH}' bash -s" <<'REMOTE'
          set -euo pipefail

          ensure_shared_git_permissions() {
            local git_dir
            local group_name

            git_dir="$(git rev-parse --git-dir)"
            group_name="$(id -gn)"

            git config core.sharedRepository group >/dev/null 2>&1 || true
            git config core.filemode false >/dev/null 2>&1 || true

            if sudo -n true >/dev/null 2>&1; then
              sudo chgrp -R "${group_name}" "${git_dir}" || true
              sudo chmod -R g+rwX "${git_dir}" || true
              sudo find "${git_dir}" -type d -exec chmod g+s {} + || true
            else
              chgrp -R "${group_name}" "${git_dir}" 2>/dev/null || true
              chmod -R g+rwX "${git_dir}" 2>/dev/null || true
              find "${git_dir}" -type d -exec chmod g+s {} + 2>/dev/null || true
            fi
          }

          retry_git_fetch() {
            local remote="$1"
            local branch="$2"
            local attempt=1
            local max_attempts=5
            local delay_sec=5

            while (( attempt <= max_attempts )); do
              if git fetch --prune "${remote}" "${branch}"; then
                return 0
              fi
              if (( attempt == max_attempts )); then
                echo "error: git fetch ${remote} ${branch} failed after ${max_attempts} attempts" >&2
                return 1
              fi
              echo "warning: git fetch ${remote} ${branch} failed on attempt ${attempt}/${max_attempts}; retrying in ${delay_sec}s" >&2
              sleep "${delay_sec}"
              delay_sec=$(( delay_sec * 2 ))
              attempt=$(( attempt + 1 ))
            done
          }

          git config http.version HTTP/1.1 >/dev/null 2>&1 || true
          ensure_shared_git_permissions
          retry_git_fetch origin "${NAIM_RELEASE_BRANCH}"

          if git show-ref --verify --quiet "refs/heads/${NAIM_RELEASE_BRANCH}"; then
            git checkout -f "${NAIM_RELEASE_BRANCH}"
          else
            git checkout -B "${NAIM_RELEASE_BRANCH}" "origin/${NAIM_RELEASE_BRANCH}"
          fi

          git reset --hard "origin/${NAIM_RELEASE_BRANCH}"

          current_sha="$(git rev-parse HEAD)"
          if [[ "${current_sha}" != "${NAIM_RELEASE_SHA}" ]]; then
            echo "error: ${NAIM_RELEASE_BRANCH} resolved to ${current_sha}, expected ${NAIM_RELEASE_SHA}" >&2
            exit 1
          fi

          echo "hpc1 repository is at ${current_sha}"
          REMOTE

  detect-release-scope:
    name: 1a. detect release scope
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: hpc1-pull
    outputs:
      native_build_required: ${{ steps.scope.outputs.native_build_required }}
      native_build_reason: ${{ steps.scope.outputs.native_build_reason }}
      native_matched_file: ${{ steps.scope.outputs.native_matched_file }}
      turboquant_required: ${{ steps.scope.outputs.turboquant_required }}
      turboquant_reason: ${{ steps.scope.outputs.turboquant_reason }}
      turboquant_matched_file: ${{ steps.scope.outputs.turboquant_matched_file }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-naim-ssh
        with:
          ssh-private-key: ${{ secrets.NAIM_DEPLOY_SSH_KEY }}
      - id: scope
        name: Detect TurboQuant-sensitive changes
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          NAIM_RELEASE_BEFORE: ${{ github.event.before }}
          NAIM_TURBOQUANT_ARTIFACT_CHECK: always
        run: |
          set -euo pipefail
          bash scripts/ci/detect-release-scope.sh

  hpc1-build:
    name: 2. hpc1 build
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs:
      - hpc1-pull
      - detect-release-scope
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-naim-ssh
        with:
          ssh-private-key: ${{ secrets.NAIM_DEPLOY_SSH_KEY }}
      - name: Build on hpc1
        shell: bash
        run: |
          set -euo pipefail
          repo_q="$(printf '%q' "${NAIM_HPC1_REPO_PATH}")"
          vcpkg_root_q="$(printf '%q' "${NAIM_HPC1_VCPKG_ROOT}")"
          ssh ${NAIM_CI_SSH_OPTS} -p "${NAIM_HPC1_SSH_PORT}" "${NAIM_HPC1_SSH}" \
            "cd ${repo_q} && VCPKG_ROOT=${vcpkg_root_q} NAIM_RELEASE_SHA='${NAIM_RELEASE_SHA}' NAIM_BUILD_TYPE='${NAIM_BUILD_TYPE}' NAIM_CUDA_ARCHITECTURES='${NAIM_CUDA_ARCHITECTURES}' NAIM_CUDA_NVCC_JOBS='${NAIM_CUDA_NVCC_JOBS}' NAIM_COMPILER_CACHE='${NAIM_COMPILER_CACHE}' NAIM_CMAKE_ARGS='${NAIM_CMAKE_ARGS}' bash scripts/ci/hpc1-build.sh"

  hpc1-build-turboquant:
    name: 2b. hpc1 TurboQuant build
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs:
      - hpc1-build
      - detect-release-scope
    if: needs.detect-release-scope.outputs.turboquant_required == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-naim-ssh
        with:
          ssh-private-key: ${{ secrets.NAIM_DEPLOY_SSH_KEY }}
      - name: Build TurboQuant runtime on hpc1
        shell: bash
        run: |
          set -euo pipefail
          repo_q="$(printf '%q' "${NAIM_HPC1_REPO_PATH}")"
          vcpkg_root_q="$(printf '%q' "${NAIM_HPC1_VCPKG_ROOT}")"
          ssh ${NAIM_CI_SSH_OPTS} -p "${NAIM_HPC1_SSH_PORT}" "${NAIM_HPC1_SSH}" \
            "cd ${repo_q} && VCPKG_ROOT=${vcpkg_root_q} NAIM_RELEASE_SHA='${NAIM_RELEASE_SHA}' NAIM_BUILD_TYPE='${NAIM_BUILD_TYPE}' NAIM_CUDA_ARCHITECTURES='${NAIM_CUDA_ARCHITECTURES}' NAIM_CUDA_NVCC_JOBS='${NAIM_CUDA_NVCC_JOBS}' NAIM_COMPILER_CACHE='${NAIM_COMPILER_CACHE}' NAIM_CMAKE_ARGS='${NAIM_CMAKE_ARGS}' bash scripts/ci/hpc1-build-turboquant.sh"

  hpc1-knowledge-vault-release-gate:
    name: 2a. hpc1 Knowledge Vault release gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: hpc1-build
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-naim-ssh
        with:
          ssh-private-key: ${{ secrets.NAIM_DEPLOY_SSH_KEY }}
      - name: Run Knowledge Vault release gate on hpc1
        shell: bash
        run: |
          set -euo pipefail
          repo_q="$(printf '%q' "${NAIM_HPC1_REPO_PATH}")"
          ssh ${NAIM_CI_SSH_OPTS} -p "${NAIM_HPC1_SSH_PORT}" "${NAIM_HPC1_SSH}" \
            "cd ${repo_q} && NAIM_RELEASE_SHA='${NAIM_RELEASE_SHA}' NAIM_BUILD_TYPE='${NAIM_BUILD_TYPE}' bash scripts/ci/knowledge-vault-release-gate.sh"

  hpc1-build-push-harbor:
    name: 3. hpc1 build containers and push Harbor
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs:
      - detect-release-scope
      - hpc1-knowledge-vault-release-gate
      - hpc1-build-turboquant
    if: >-
      always() &&
      needs.detect-release-scope.result == 'success' &&
      needs.hpc1-knowledge-vault-release-gate.result == 'success' &&
      (needs.hpc1-build-turboquant.result == 'success' || needs.hpc1-build-turboquant.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-naim-ssh
        with:
          ssh-private-key: ${{ secrets.NAIM_DEPLOY_SSH_KEY }}
      - name: Build and push images from hpc1
        shell: bash
        env:
          NAIM_REGISTRY_PASSWORD: ${{ secrets.NAIM_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          repo_q="$(printf '%q' "${NAIM_HPC1_REPO_PATH}")"
          password_file="/tmp/naim-registry-password-${GITHUB_RUN_ID}-${GITHUB_JOB}"
          cleanup() {
            ssh ${NAIM_CI_SSH_OPTS} -p "${NAIM_HPC1_SSH_PORT}" "${NAIM_HPC1_SSH}" \
              "rm -f $(printf '%q' "${password_file}")" || true
          }
          trap cleanup EXIT
          if [[ -n "${NAIM_REGISTRY_PASSWORD}" ]]; then
            printf '%s' "${NAIM_REGISTRY_PASSWORD}" | ssh ${NAIM_CI_SSH_OPTS} -p "${NAIM_HPC1_SSH_PORT}" "${NAIM_HPC1_SSH}" \
              "umask 077; cat > $(printf '%q' "${password_file}")"
            password_env="NAIM_REGISTRY_PASSWORD_FILE='${password_file}'"
          else
            password_env=""
          fi
          ssh ${NAIM_CI_SSH_OPTS} -p "${NAIM_HPC1_SSH_PORT}" "${NAIM_HPC1_SSH}" \
            "cd ${repo_q} && NAIM_RELEASE_SHA='${NAIM_RELEASE_SHA}' NAIM_RELEASE_TAG='${NAIM_RELEASE_TAG}' NAIM_REGISTRY='${NAIM_REGISTRY}' NAIM_REGISTRY_PROJECT='${NAIM_REGISTRY_PROJECT}' NAIM_REGISTRY_USERNAME='${NAIM_REGISTRY_USERNAME}' ${password_env} bash scripts/ci/hpc1-build-push-harbor.sh"

  main-register-release:
    name: 4. main register Harbor release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - hpc1-build-push-harbor
      - main-capture-release-state
    if: >-
      always() &&
      needs.hpc1-build-push-harbor.result == 'success' &&
      needs.main-capture-release-state.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-naim-ssh
        with:
          ssh-private-key: ${{ secrets.NAIM_DEPLOY_SSH_KEY }}
      - name: Fetch release manifest from hpc1
        shell: bash
        run: |
          set -euo pipefail
          repo_q="$(printf '%q' "${NAIM_HPC1_REPO_PATH}")"
          manifest_remote="${NAIM_HPC1_REPO_PATH}/var/release-manifest-${NAIM_RELEASE_TAG}.json"
          ssh ${NAIM_CI_SSH_OPTS} -p "${NAIM_HPC1_SSH_PORT}" "${NAIM_HPC1_SSH}" \
            "cat $(printf '%q' "${manifest_remote}")" > "${RUNNER_TEMP}/release-manifest.json"
      - name: Register release on main
        shell: bash
        run: |
          set -euo pipefail
          export NAIM_SSH_OPTS="${NAIM_CI_SSH_OPTS}"
          export NAIM_MAIN_SSH
          export NAIM_IMAGE_TAG="${NAIM_RELEASE_TAG}"
          bash scripts/ci/register-release-on-main.sh \
            --manifest "${RUNNER_TEMP}/release-manifest.json" \
            --tag "${NAIM_RELEASE_TAG}"

  main-capture-release-state:
    name: 3a. main capture rollback snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: hpc1-build-push-harbor
    if: >-
      always() &&
      needs.hpc1-build-push-harbor.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-naim-ssh
        with:
          ssh-private-key: ${{ secrets.NAIM_DEPLOY_SSH_KEY }}
      - name: Capture main rollback snapshot
        shell: bash
        run: |
          set -euo pipefail
          export NAIM_SSH_OPTS="${NAIM_CI_SSH_OPTS}"
          export NAIM_MAIN_SSH
          export NAIM_RELEASE_TAG
          bash scripts/ci/capture-main-release-state.sh \
            --tag "${NAIM_RELEASE_TAG}" \
            --output "${RUNNER_TEMP}/main-release-snapshot.json"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: main-release-snapshot
          path: ${{ runner.temp }}/main-release-snapshot.json
          if-no-files-found: error

  main-bootstrap-controller-update:
    name: 5. main bootstrap controller update
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: main-register-release
    if: >-
      always() &&
      needs.main-register-release.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-naim-ssh
        with:
          ssh-private-key: ${{ secrets.NAIM_DEPLOY_SSH_KEY }}
      - name: Bootstrap main controller update and managed rollout
        shell: bash
        env:
          NAIM_REGISTRY_PASSWORD: ${{ secrets.NAIM_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          password_file=""
          if [[ -n "${NAIM_REGISTRY_PASSWORD}" ]]; then
            password_file="${RUNNER_TEMP}/registry-password"
            printf '%s' "${NAIM_REGISTRY_PASSWORD}" > "${password_file}"
            chmod 0600 "${password_file}"
            export NAIM_REGISTRY_PASSWORD_FILE="${password_file}"
          fi
          export NAIM_SSH_OPTS="${NAIM_CI_SSH_OPTS}"
          export NAIM_MAIN_SSH
          export NAIM_HPC1_SSH
          export NAIM_HPC1_SSH_PORT
          export NAIM_REGISTRY
          export NAIM_REGISTRY_PROJECT
          export NAIM_REGISTRY_USERNAME
          export NAIM_IMAGE_TAG="${NAIM_RELEASE_TAG}"
          export NAIM_RELEASE_TAG
          export NAIM_MIGRATION_TIMEOUT_SEC
          bash scripts/ci/main-bootstrap-controller-update.sh --tag "${NAIM_RELEASE_TAG}"

  migration-report:
    name: 6. migration report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: main-bootstrap-controller-update
    if: >-
      always() &&
      needs.main-bootstrap-controller-update.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-naim-ssh
        with:
          ssh-private-key: ${{ secrets.NAIM_DEPLOY_SSH_KEY }}
      - name: Fetch release manifest from hpc1
        shell: bash
        run: |
          set -euo pipefail
          manifest_remote="${NAIM_HPC1_REPO_PATH}/var/release-manifest-${NAIM_RELEASE_TAG}.json"
          ssh ${NAIM_CI_SSH_OPTS} -p "${NAIM_HPC1_SSH_PORT}" "${NAIM_HPC1_SSH}" \
            "cat $(printf '%q' "${manifest_remote}")" > "${RUNNER_TEMP}/release-manifest.json"
      - name: Write short migration report
        shell: bash
        run: |
          set -euo pipefail
          export NAIM_SSH_OPTS="${NAIM_CI_SSH_OPTS}"
          export NAIM_MAIN_SSH
          export NAIM_RELEASE_TAG
          bash scripts/ci/fetch-main-release-report.sh \
            --tag "${NAIM_RELEASE_TAG}" \
            --manifest "${RUNNER_TEMP}/release-manifest.json" \
            --output "${RUNNER_TEMP}/migration-report.md"
          cat "${RUNNER_TEMP}/migration-report.md" >> "${GITHUB_STEP_SUMMARY}"

  release-report-and-rollback:
    name: 7. release report and rollback
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - hpc1-pull
      - detect-release-scope
      - hpc1-build
      - hpc1-build-turboquant
      - hpc1-knowledge-vault-release-gate
      - hpc1-build-push-harbor
      - main-capture-release-state
      - main-register-release
      - main-bootstrap-controller-update
      - migration-report
    if: always()
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-naim-ssh
        with:
          ssh-private-key: ${{ secrets.NAIM_DEPLOY_SSH_KEY }}
      - name: Download rollback snapshot
        if: needs.main-capture-release-state.result == 'success'
        uses: actions/download-artifact@v8.0.1
        with:
          name: main-release-snapshot
          path: ${{ runner.temp }}
      - name: Write release report and rollback on failure
        shell: bash
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          NAIM_REGISTRY_PASSWORD: ${{ secrets.NAIM_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          report_path="${RUNNER_TEMP}/release-final-report.md"
          snapshot_path="${RUNNER_TEMP}/main-release-snapshot.json"
          export NAIM_SSH_OPTS="${NAIM_CI_SSH_OPTS}"
          export NAIM_MAIN_SSH
          export NAIM_HPC1_SSH
          export NAIM_HPC1_SSH_PORT
          export NAIM_REGISTRY
          export NAIM_REGISTRY_PROJECT
          export NAIM_REGISTRY_USERNAME
          export NAIM_RELEASE_TAG
          export NAIM_MIGRATION_TIMEOUT_SEC
          password_file=""
          if [[ -n "${NAIM_REGISTRY_PASSWORD}" ]]; then
            password_file="${RUNNER_TEMP}/registry-password-rollback"
            printf '%s' "${NAIM_REGISTRY_PASSWORD}" > "${password_file}"
            chmod 0600 "${password_file}"
            export NAIM_REGISTRY_PASSWORD_FILE="${password_file}"
          fi
          python3 - "${report_path}" <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          report_path = sys.argv[1]
          failed = []
          lines = [
              "## NAIM production release final report",
              "",
              f"- release tag: `{os.environ.get('NAIM_RELEASE_TAG', '')}`",
              "",
              "| Stage | Result |",
              "| --- | --- |",
          ]
          for name, payload in needs.items():
              result = payload.get("result", "unknown")
              lines.append(f"| `{name}` | `{result}` |")
              if name == "hpc1-build-turboquant" and result == "skipped":
                  continue
              if result not in {"success", "skipped"}:
                  failed.append((name, result))
          if failed:
              lines.extend(["", "### Failed Stages"])
              for name, result in failed:
                  lines.append(f"- `{name}` ended with `{result}`")
          else:
              lines.extend(["", "All release stages passed. Rollback was not required."])
          with open(report_path, "w", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          print("failed=" + ("true" if failed else "false"))
          PY
          cat "${report_path}" >> "${GITHUB_STEP_SUMMARY}"
          failed="$(python3 - "${report_path}" <<'PY'
          import sys
          text = open(sys.argv[1], encoding="utf-8").read()
          print("true" if "### Failed Stages" in text else "false")
          PY
          )"
          deploy_attempted="$(python3 - <<'PY'
          import json
          import os
          needs = json.loads(os.environ["NEEDS_JSON"])
          result = needs.get("main-register-release", {}).get("result", "skipped")
          print("true" if result != "skipped" else "false")
          PY
          )"
          if [[ "${failed}" == "true" && "${deploy_attempted}" == "true" && -f "${snapshot_path}" ]]; then
            rollback_report="${RUNNER_TEMP}/rollback-report.md"
            if bash scripts/ci/rollback-main-release.sh \
                --snapshot "${snapshot_path}" \
                --failed-tag "${NAIM_RELEASE_TAG}" \
                --output "${rollback_report}"; then
              cat "${rollback_report}" >> "${GITHUB_STEP_SUMMARY}"
            else
              rollback_status=$?
              cat "${rollback_report}" >> "${GITHUB_STEP_SUMMARY}" 2>/dev/null || true
              echo "rollback command exited with ${rollback_status}" >> "${GITHUB_STEP_SUMMARY}"
              exit "${rollback_status}"
            fi
          elif [[ "${failed}" == "true" && "${deploy_attempted}" == "true" ]]; then
            echo "rollback skipped: deploy was attempted but rollback snapshot is unavailable" >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi
          [[ "${failed}" != "true" ]]
